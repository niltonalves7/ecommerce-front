<main class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <section class="sm:mx-auto sm:w-full sm:max-w-md">
    <header class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Bem-vindo de volta</h2>
      <p class="mt-2 text-sm text-gray-600">
        Ainda não tem conta? 
        <a routerLink="/register" class="font-medium text-red-700 hover:text-red-500 transition-colors cursor-pointer">Cadastre-se</a>
      </p>
    </header>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
      <article class="bg-white py-8 px-4 shadow-xl border border-gray-100 sm:rounded-2xl sm:px-10">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          
          <div>
            <label for="login-email" class="block text-sm font-semibold text-gray-700">E-mail</label>
            <input id="login-email" type="email" formControlName="email"
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all">
              @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
                  <p class="text-xs text-red-500 mt-1">E-mail é obrigatório</p>
              }
          </div>

          <div>
            <label for="login-password" class="block text-sm font-semibold text-gray-700">Senha</label>
            <input id="login-password" type="password" formControlName="password"
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all">
          </div>

          <button type="submit" [disabled]="loginForm.invalid"
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-red-700 hover:bg-red-500 disabled:bg-gray-300 transition-all transform active:scale-95">
            Entrar
          </button>
          <!-- adicionar abaixo do botão -->
          @if (errorMessage) {
          <p class="text-sm text-red-600 text-center mt-2">{{ errorMessage }}</p>
          }
        </form>
      </article>
    </div>
  </section>
</main>
