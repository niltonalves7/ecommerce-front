@if (product$ | async; as product) {
    <div class="max-w-5xl mx-auto px-4 py-8">

        <!-- Voltar -->
        <button (click)="goBack()"
                class="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-800 transition-colors mb-6">
            ← Voltar para produtos
        </button>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

            <!-- Imagem -->
            <div class="bg-gray-100 rounded-2xl overflow-hidden h-96">
                <img [src]="product.imageUrl || 'assets/placeholder.png'"
                     [alt]="product.name"
                     class="w-full h-full object-cover"/>
            </div>

            <!-- Detalhes -->
            <div class="flex flex-col justify-between">
                <div>
                    <span class="text-xs text-gray-400 uppercase tracking-widest">
                        {{ product.category?.name}}
                    </span>
                    <h1 class="text-3xl font-bold text-gray-900 mt-2">{{ product.name }}</h1>
                    <p class="text-gray-500 mt-4 leading-relaxed">{{ product.description }}</p>
                </div>

                <div class="mt-8">
                    <p class="text-4xl font-bold text-gray-900">
                        {{ product.price | currency:'BRL' }}
                    </p>

                    <!-- Estoque -->
                    @if (product.stockQuantity > 0) {
                        <p class="text-sm text-green-600 mt-2">✓ Em estoque</p>
                    } @else {
                        <p class="text-sm text-red-500 mt-2">✗ Fora de estoque</p>
                    }

                    <button (click)="addToCart(product)"
                            [disabled]="product.stockQuantity === 0"
                            class="mt-6 w-full py-3 px-6 bg-black text-white font-semibold rounded-xl
                                hover:bg-gray-800 transition-colors disabled:bg-gray-300
                                disabled:cursor-not-allowed active:scale-95">
                        Adicionar ao carrinho
                    </button>
                </div>
            </div>
        </div>
    </div>
} @else {
    <div class="flex justify-center items-center h-64">
        <p class="text-gray-500">Carregando produto...</p>
    </div>
}
