<div class="max-w-2xl mx-auto px-4 py-8">

    <button (click)="goBack()"
            class="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-800 transition-colors mb-8">
        ← Voltar
    </button>

    <h1 class="text-2xl font-medium text-gray-900 mb-8">Minha Conta</h1>

    @if (isLoading) {
        <div class="flex justify-center items-center h-48">
            <p class="text-gray-400 text-sm">Carregando...</p>
        </div>
    } @else {

        <!-- Dados pessoais -->
        <div class="bg-white border border-gray-100 rounded-2xl p-6 mb-6">
            <h2 class="text-base font-medium text-gray-900 mb-4">Dados pessoais</h2>

            <form [formGroup]="profileForm" (ngSubmit)="updateProfile()" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
                    <input type="text" formControlName="name"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <input type="email" formControlName="email"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
                </div>

                @if (profileSuccess) {
                    <p class="text-sm text-green-600">{{ profileSuccess }}</p>
                }
                @if (profileError) {
                    <p class="text-sm text-red-500">{{ profileError }}</p>
                }

                <button type="submit" [disabled]="profileForm.invalid"
                        class="px-4 py-2 bg-black text-white text-sm font-medium rounded-lg
                               hover:bg-gray-800 transition-colors disabled:bg-gray-300">
                    Salvar alterações
                </button>
            </form>
        </div>

        <!-- Alterar senha -->
        <div class="bg-white border border-gray-100 rounded-2xl p-6">
            <h2 class="text-base font-medium text-gray-900 mb-4">Alterar senha</h2>

            <form [formGroup]="passwordForm" (ngSubmit)="updatePassword()" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha atual</label>
                    <input type="password" formControlName="currentPassword"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nova senha</label>
                    <input type="password" formControlName="newPassword"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar nova senha</label>
                    <input type="password" formControlName="confirmPassword"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
                </div>

                @if (passwordSuccess) {
                    <p class="text-sm text-green-600">{{ passwordSuccess }}</p>
                }
                @if (passwordError) {
                    <p class="text-sm text-red-500">{{ passwordError }}</p>
                }

                <button type="submit" [disabled]="passwordForm.invalid"
                        class="px-4 py-2 bg-black text-white text-sm font-medium rounded-lg
                               hover:bg-gray-800 transition-colors disabled:bg-gray-300">
                    Alterar senha
                </button>
            </form>
        </div>
    }
</div>
