<header class="bg-white border-b border-gray-100">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    
    <div class="flex items-center">
      <a routerLink="/" class="text-2xl font-bold text-black tracking-tight hover:text-gray-700 transition-colors">
        NEXO 
      </a>
      <span class="text-gray-500 font-normal pt-1 pl-2">Sports</span>
    </div>

    <div class="flex items-center gap-4">

      <!-- Ícone carrinho -->
      <button (click)="cartService.toggleSidebar()" class="relative p-2">
        <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        @if ((cartService.cartCount$ | async) ?? 0; as count) {
          @if (count > 0) {
            <span class="absolute -top-1 -right-1 bg-black text-white text-xs font-medium
                         w-5 h-5 rounded-full flex items-center justify-center">
              {{ count > 9 ? '9+' : count }}
            </span>
          }
        }
      </button>

      @if (authService.currentUser$ | async; as user) {

        <!-- User menu -->
        <div id="user-menu" class="relative">
          <button (click)="toggleDropdown()"
                  class="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100 transition-colors">
            <!-- Ícone usuário -->
            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center">
              <span class="text-white text-xs font-medium">{{ user.name.charAt(0).toUpperCase() }}</span>
            </div>
            <!-- Seta -->
            <svg class="w-4 h-4 text-gray-500 transition-transform duration-200"
                 [class.rotate-180]="isDropdownOpen"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <!-- Dropdown -->
          @if (isDropdownOpen) {
            <div class="absolute right-0 mt-2 w-48 bg-white border border-gray-100 rounded-xl shadow-lg z-50 py-1">
              <div class="px-4 py-2 border-b border-gray-100">
                <p class="text-sm font-medium text-gray-900">{{ user.name }}</p>
                <p class="text-xs text-gray-400 truncate">{{ user.email }}</p>
              </div>

              <a routerLink="/account" (click)="closeDropdown()"
                class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                  </svg>
                  Minha conta
              </a>

              <a routerLink="/orders" (click)="closeDropdown()"
                 class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                Meus pedidos
              </a>

              @if (isAdmin) {
                <a routerLink="/admin" (click)="closeDropdown()"
                  class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                  Painel Admin
                </a>
              }

              <button (click)="logout()"
                      class="flex items-center gap-3 w-full px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Sair
              </button>
            </div>
          }
        </div>

      } @else {
        <div class="flex items-center gap-4">
          <a routerLink="/login" class="text-sm font-semibold text-gray-700 hover:text-gray-900 transition-colors">Entrar</a>
          <a routerLink="/register" 
            class="px-4 py-2 text-sm font-bold text-white bg-black rounded-lg hover:bg-gray-800 transition-all active:scale-95">
            Cadastrar
          </a>
        </div>
      }
    </div>
  </nav>
</header>
